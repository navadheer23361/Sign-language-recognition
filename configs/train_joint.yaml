work_dir: ./work_dir/train_joint

feeder: feeders.feeder.Feeder

train_feeder_args:
  data_path: ./data/sign/27_2/train_data_joint.npy
  label_path: ./data/sign/27_2/train_label.pkl

test_feeder_args:
  data_path: ./data/sign/27_2/test_data_joint.npy
  label_path: ./data/sign/27_2/test_label.pkl

model: models.sl_gcn.Model

model_args:
  num_class: 2000
  num_point: 27
  num_person: 1
  graph: graph.sign_27.Graph

batch_size: 16
test_batch_size: 16

num_epoch: 100

optimizer: SGD

base_lr: 0.1

weight_decay: 0.0005

step:
  - 50
  - 80